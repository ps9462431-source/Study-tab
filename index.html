<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Priyanshu Study Timer</title>

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#04101f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Study Timer" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="Priyanshu's personal study timer with focus mode" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />
  <style>
    :root{
      --text:#e8e4d9;
      --muted:#97a8c4;
      --teal:#20d1c2;
      --green:#22c55e;
      --yellow:#eab308;
      --red:#ef4444;

      --card:rgba(6, 16, 31, 0.56);
      --card-border:rgba(255,255,255,0.08);
      --input-bg:rgba(7,18,33,0.76);
      --button-bg:#1a2946;
      --button-text:#e8e4d9;
      --quote-bg:rgba(7,18,33,0.70);

      --overlay-dark:rgba(2,8,20,0.52);
      --overlay-top:rgba(2,8,20,0.26);
      --side-light-opacity:0.28;
    }

    /* 🌞 Day mode */
    body.day{
      --text:#0f172a;
      --muted:#334155;
      --card:rgba(255,255,255,0.18);
      --card-border:rgba(255,255,255,0.45);
      --input-bg:rgba(255,255,255,0.28);
      --button-bg:rgba(255,255,255,0.35);
      --button-text:#0f172a;
      --quote-bg:rgba(255,255,255,0.22);

      --overlay-dark:rgba(255,255,255,0.05);
      --overlay-top:rgba(255,255,255,0.02);
      --side-light-opacity:0.16;
    }

    /* Day mode - transparent/glass only when user enables */
    body.day .app{
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.28);
      backdrop-filter: blur(24px) saturate(1.3);
      -webkit-backdrop-filter: blur(24px) saturate(1.3);
    }

    body.day .top{
      background:
        radial-gradient(circle at top center, rgba(32,209,194,0.08), transparent 42%),
        rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.20);
    }

    /* Focus mode - hide settings btn, reduce distractions */
    body.focus .settings-btn{
      opacity: 0.85;
      pointer-events: auto;
    }

    body.focus .hero-sub{
      display: none;
    }

    body.focus .tap-note{
      display: none;
    }

    /* Deep night mode overrides */
    body.night{
      --card:rgba(4, 10, 20, 0.76);
      --card-border:rgba(255,255,255,0.05);
      --input-bg:rgba(4, 10, 20, 0.88);
      --button-bg:#10203b;
      --button-text:#e8e4d9;
      --quote-bg:rgba(4, 10, 20, 0.84);
      --overlay-dark:rgba(1,4,10,0.74);
      --overlay-top:rgba(1,4,10,0.42);
      --side-light-opacity:0.14;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html{
      height: -webkit-fill-available;
    }

    html, body{
      width:100%;
      height:100%;
      min-height: -webkit-fill-available;
      overflow:hidden;
      font-family:Arial, sans-serif;
      color:var(--text);
    }

    body{
      position:relative;
      background:#04101f;
      min-height: 100dvh;
      transition:background 0.4s ease, color 0.4s ease;
    }

    body.day{
      background: #b8b0c8;
    }

    .bg{
      position:fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      /* Use 100vmax so image always covers everything including status bar area */
      min-width: 100vmax;
      min-height: 100vmax;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      object-fit:cover;
      z-index:0;
      filter:brightness(0.50) saturate(1.02);
      transition:opacity 0.8s ease, filter 0.5s ease;
    }

    body.day .bg{
      filter:brightness(0.94) saturate(1.02) blur(1px);
    }

    body.focus .bg{
      filter:brightness(0.28) saturate(0.95) blur(2px);
    }

    .bg-dark{
      position:fixed;
      inset:0;
      z-index:1;
      background:
        linear-gradient(180deg, var(--overlay-top), var(--overlay-dark)),
        radial-gradient(circle at center, rgba(3,12,28,0.08), rgba(3,12,28,0.28));
      transition:background 0.4s ease;
    }

    .side-light{
      position:fixed;
      top:0;
      bottom:0;
      width:18vw;
      min-width:90px;
      max-width:220px;
      z-index:2;
      pointer-events:none;
      opacity:var(--side-light-opacity);
      transition:opacity 0.4s ease;
    }

    .side-light.left{
      left:0;
      background:
        linear-gradient(to right,
          rgba(255,255,255,0.24) 0%,
          rgba(255,255,255,0.12) 18%,
          rgba(255,255,255,0.04) 38%,
          transparent 70%);
      filter:blur(22px);
    }

    .side-light.right{
      right:0;
      background:
        linear-gradient(to left,
          rgba(255,255,255,0.24) 0%,
          rgba(255,255,255,0.12) 18%,
          rgba(255,255,255,0.04) 38%,
          transparent 70%);
      filter:blur(22px);
    }

    body.focus .side-light.left,
    body.focus .side-light.right{
      filter:blur(28px);
    }

    .page{
      position:relative;
      z-index:3;
      width:100%;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px 18px 24px;
    }

    .app{
      width:100%;
      max-width:520px;
      max-height:calc(100vh - 48px);
      overflow:auto;
      background:var(--card);
      border:1px solid var(--card-border);
      border-radius:30px;
      box-shadow:
        0 18px 40px rgba(0,0,0,0.26),
        inset 0 1px 0 rgba(255,255,255,0.03);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      transition:background 0.4s ease, border-color 0.4s ease;
    }

    .app::-webkit-scrollbar{
      width:0;
      height:0;
    }

    .top{
      position:relative;
      padding:18px 22px 14px;
      background:
        radial-gradient(circle at top center, rgba(32,209,194,0.12), transparent 42%),
        linear-gradient(to bottom, rgba(255,255,255,0.02), rgba(255,255,255,0));
      border-bottom:1px solid rgba(255,255,255,0.08);
      overflow: visible;
      z-index: 10;
    }

    .settings-btn{
      position:absolute;
      top:14px;
      right:16px;
      width:42px;
      height:42px;
      border:none;
      border-radius:50%;
      background:rgba(7,16,31,0.72);
      color:#fff;
      font-size:20px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 0 10px rgba(0,0,0,0.22);
    }

    body.day .settings-btn{
      background:rgba(255,255,255,0.52);
      color:#0f172a;
    }

    .settings-panel{
      position:fixed;
      top:0;
      right:0;
      width:270px;
      height: 100vh;
      background:rgba(7,16,31,0.98);
      border-left:1px solid rgba(32,209,194,0.18);
      padding:56px 16px 24px;
      display:none;
      box-shadow:-8px 0 40px rgba(0,0,0,0.6);
      z-index: 9999;
      overflow-y:auto;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      transition: transform 0.3s ease;
    }

    .settings-panel.show{
      display:block;
    }

    /* Close X button inside panel */
    .settings-panel::before{
      content: "✕";
      position: sticky;
      top: -40px;
      left: 0;
      display: block;
      color: var(--muted);
      font-size: 18px;
      margin-bottom: 16px;
      cursor: pointer;
      text-align: right;
    }

    body.day .settings-panel{
      background:rgba(240,245,255,0.97);
      color:#0f172a;
      border-left:1px solid rgba(0,0,0,0.10);
    }

    .settings-label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
      text-align:left;
    }

    .settings-panel select,
    .settings-panel input[type="file"],
    .settings-panel input[type="range"]{
      width:100%;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(32,209,194,0.18);
      background:#091425;
      color:#e8e4d9;
      font-size:13px;
      margin-bottom:10px;
      outline:none;
    }

    body.day .settings-panel select,
    body.day .settings-panel input[type="file"],
    body.day .settings-panel input[type="range"]{
      background:#f8fafc;
      color:#0f172a;
      border-color:#cbd5e1;
    }

    .toggle-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
      font-size:13px;
      color:var(--text);
    }

    .toggle-row input[type="checkbox"]{
      width:18px;
      height:18px;
      accent-color: var(--teal);
    }

    .hero{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding-top:2px;
    }

    .hero-title{
      font-size:15px;
      letter-spacing:2.5px;
      text-transform:uppercase;
      color:var(--text);
      margin-bottom:6px;
    }

    .name-wrap{
      min-height:40px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .animated-name{
      font-size:30px;
      font-weight:700;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      width:0;
      text-shadow:0 0 10px rgba(255,255,255,0.07);
      animation:
        typing 2.1s steps(18, end) forwards,
        blush 1.8s ease-in-out 1 2.1s forwards;
    }

    .hero-sub{
      margin-top:8px;
      color:var(--muted);
      font-size:13px;
      line-height:1.55;
      max-width:320px;
    }

    .bottom{
      padding:16px 22px 24px; /* bottom inner gap */
      text-align:center;
    }

    /* ── Big Ring ── */
    .ring-wrap{
      position: relative;
      width: 240px;
      height: 240px;
      margin: 0 auto 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .ring{
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    .ring-inner{
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      pointer-events: none;
      z-index: 2;
    }

    /* Dark glass inside ring */
    .ring-wrap::before{
      content: "";
      position: absolute;
      width: 162px;
      height: 162px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 38%, rgba(32,209,194,0.06), rgba(3,8,18,0.85) 65%);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(32,209,194,0.08);
      box-shadow: 0 0 50px rgba(0,0,0,0.7) inset;
      z-index: 1;
    }

    .progress-text{
      font-size: 13px;
      font-weight: 600;
      color: var(--teal);
      letter-spacing: 1px;
      opacity: 0.85;
    }

    .ring-timer{
      font-size: 42px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 2px;
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 20px rgba(32,209,194,0.25);
      line-height: 1;
    }

    /* Alias #timer to .ring-timer */
    #timer{
      font-size: 42px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 2px;
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 20px rgba(32,209,194,0.25);
      line-height: 1;
      transition: color 0.4s ease, text-shadow 0.4s ease;
    }

    .ring-total-label{
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    .tap-note-ring{
      font-size: 11px;
      color: rgba(150,168,196,0.5);
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .tap-note{
      font-size:12px;
      color:var(--muted);
      margin-bottom:8px;
      display: none;
    }

    body.focus #timer{
      animation: timerGlow 2.2s ease-in-out infinite;
    }

    @media (max-width: 700px){
      .ring-wrap{ width: 200px; height: 200px; }
      .ring-wrap::before{ width: 140px; height: 140px; }
      #timer{ font-size: 32px; }
      .ring-timer{ font-size: 32px; }
    }

    .input-box{
      display:flex;
      justify-content:center;
      margin-bottom:12px;
    }

    #minutesInput{
      width:230px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(32,209,194,.22);
      background:var(--input-bg);
      color:var(--text);
      text-align:center;
      font-size:16px;
      outline:none;
      -webkit-appearance:none;
      appearance:none;
      box-shadow:
        inset 0 0 12px rgba(0,0,0,.28),
        0 0 12px rgba(32,209,194,.05);
      transition:background 0.4s ease, color 0.4s ease;
    }

    #minutesInput::placeholder{
      color:var(--muted);
    }

    #minutesInput::-webkit-inner-spin-button,
    #minutesInput::-webkit-outer-spin-button{
      -webkit-appearance:none;
      margin:0;
    }

    .btn-row{
      display:flex;
      justify-content:center;
      gap:12px;
      margin-top:2px;
    }

    .main-btn{
      min-width:130px;
      padding:12px 16px;
      border:none;
      border-radius:14px;
      font-size:15px;
      color:var(--button-text);
      background:var(--button-bg);
      cursor:pointer;
      transition:.2s ease;
    }

    .main-btn:hover{
      transform:translateY(-1px);
      box-shadow:0 0 12px rgba(32,209,194,.12);
    }

    .main-btn.primary{
      background:var(--teal);
      color:#07211e;
      font-weight:700;
    }

    .quote-box{
      margin-top:14px;
      padding:12px 14px;
      border-radius:14px;
      background:var(--quote-bg);
      border:1px solid rgba(255,255,255,.05);
      font-size:14px;
      line-height:1.5;
      min-height:46px;
      max-width:420px;
      margin-left:auto;
      margin-right:auto;
      transition:background 0.4s ease;
      color:var(--text);
    }

    .notify{
      position:fixed;
      top:18px;
      left:50%;
      transform:translateX(-50%) translateY(-110%);
      min-width:260px;
      max-width:86vw;
      padding:14px 16px;
      border-radius:16px;
      background:rgba(7,16,31,0.92);
      color:#fff;
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:0 14px 30px rgba(0,0,0,0.3);
      z-index:10;
      transition:transform 0.45s ease, opacity 0.45s ease;
      opacity:0;
      backdrop-filter:blur(10px);
      text-align:center;
      font-size:14px;
    }

    .notify.show{
      transform:translateX(-50%) translateY(0);
      opacity:1;
    }

    body.day .notify{
      background:rgba(255,255,255,0.92);
      color:#0f172a;
    }

    .ring-alert{
      animation: ringPulse 0.9s ease-in-out infinite !important;
    }

    .ring-alert .ring{
      filter: drop-shadow(0 0 20px rgba(32,209,194,0.8)) drop-shadow(0 0 40px rgba(32,209,194,0.4));
    }

    .ring-alert #progressCircle{
      stroke: #20d1c2 !important;
    }

    @keyframes typing{
      from{ width:0; }
      to{ width:230px; }
    }

    @keyframes blush{
      0%{
        color:inherit;
        text-shadow:0 0 0 rgba(255,80,120,0);
        transform:scale(1);
      }
      50%{
        color:#ffd7e4;
        text-shadow:0 0 14px rgba(255,120,160,0.55);
        transform:scale(1.03);
      }
      100%{
        color:inherit;
        text-shadow:0 0 8px rgba(255,120,160,0.16);
        transform:scale(1);
      }
    }

    @keyframes timerGlow{
      0%, 100%{
        color:#f8fafc;
        text-shadow:0 0 6px rgba(255,255,255,0.12), 0 0 14px rgba(32,209,194,0.14);
      }
      50%{
        color:#ffdbe7;
        text-shadow:0 0 10px rgba(255,160,190,0.34), 0 0 22px rgba(32,209,194,0.22);
      }
    }

    @keyframes ringPulse{
      0%  { transform: scale(1);    filter: drop-shadow(0 0 0px rgba(32,209,194,0)); }
      25% { transform: scale(1.07); filter: drop-shadow(0 0 22px rgba(32,209,194,0.8)); }
      50% { transform: scale(1);    filter: drop-shadow(0 0 8px rgba(32,209,194,0.3)); }
      75% { transform: scale(1.07); filter: drop-shadow(0 0 22px rgba(32,209,194,0.8)); }
      100%{ transform: scale(1);    filter: drop-shadow(0 0 0px rgba(32,209,194,0)); }
    }

    @media (max-width: 700px){
      .side-light{
        width:18vw;
        min-width:70px;
      }

      .page{
        padding:16px 14px;
        padding-bottom: max(16px, env(safe-area-inset-bottom));
        align-items: flex-start;
        padding-top: max(16px, env(safe-area-inset-top));
      }

      .app{
        max-width:430px;
        max-height: calc(100dvh - 32px);
      }

      #minutesInput{
        width:190px;
      }

      .main-btn{
        min-width:110px;
      }
    }

    /* Landscape mode - single column, compact */
    @media (orientation: landscape){
      .page{
        padding: max(8px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(8px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
        align-items: center;
      }

      .app{
        max-width: 700px;
        max-height: calc(100dvh - 16px);
        display: flex;
        flex-direction: row;
        border-radius: 24px;
        overflow: hidden;
      }

      /* Left side: top section (name + settings) */
      .top{
        width: 220px;
        min-width: 220px;
        flex-shrink: 0;
        padding: 14px 16px 14px;
        border-bottom: none;
        border-right: 1px solid rgba(255,255,255,0.08);
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      /* Right side: bottom (ring + controls) */
      .bottom{
        flex: 1;
        padding: 10px 16px 14px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow-y: auto;
      }

      .ring-wrap{
        width: 160px;
        height: 160px;
        margin-bottom: 8px;
        flex-shrink: 0;
      }

      .ring-wrap::before{
        width: 128px;
        height: 128px;
      }

      #timer{
        font-size: 28px;
      }

      .ring-timer{
        font-size: 28px;
      }

      .progress-text{
        font-size: 11px;
      }

      .ring-total-label{
        font-size: 10px;
      }

      .tap-note-ring{
        font-size: 10px;
      }

      .hero-title{
        font-size: 11px;
      }

      .animated-name{
        font-size: 20px;
      }

      .hero-sub{
        font-size: 11px;
        margin-top: 4px;
      }

      .wheel-selector-wrap{
        max-width: 100%;
      }

      .wheel-selector{
        height: 130px;
      }

      .wheel-drum{
        height: 130px;
        padding: 47px 0;
      }

      .wheel-item{ font-size: 18px; }
      .wheel-item.near{ font-size: 20px; }
      .wheel-item.selected{ font-size: 24px; }

      .wheel-selected-bar{ margin-top: 8px; }

      .quote-box{
        margin-top: 6px;
        font-size: 11px;
        min-height: 28px;
        padding: 6px 10px;
      }

      .main-btn{
        min-width: 90px;
        padding: 10px 12px;
        font-size: 13px;
      }

      .btn-row{
        margin-top: 6px;
        gap: 8px;
      }
    }

    /* Tablet portrait */
    @media (min-width: 700px) and (orientation: portrait){
      .page{
        align-items: center;
        padding: 32px 24px;
      }

      .app{
        max-width: 560px;
        max-height: calc(100dvh - 64px);
      }
    }

    /* ── Scroll Wheel Selector ── */
    .wheel-selector-wrap{
      position: relative;
      margin: 0 auto 14px;
      width: 100%;
      max-width: 340px;
    }

    .wheel-selector{
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      height: 180px;
      overflow: hidden;
      border-radius: 18px;
      background: var(--input-bg);
      border: 1px solid rgba(32,209,194,0.18);
      box-shadow: inset 0 0 24px rgba(0,0,0,0.28);
      position: relative;
    }

    .wheel-col{
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      position: relative;
      height: 100%;
    }

    .wheel-label{
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--teal);
      text-transform: uppercase;
      font-weight: 600;
      position: absolute;
      top: 6px;
      left: 0; right: 0;
      text-align: center;
      pointer-events: none;
      z-index: 4;
    }

    .wheel-drum{
      height: 180px;
      overflow-y: scroll;
      overflow-x: hidden;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      width: 100%;
      padding: 72px 0;
      cursor: grab;
    }

    .wheel-drum:active{ cursor: grabbing; }
    .wheel-drum::-webkit-scrollbar{ display: none; }

    .wheel-item{
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 300;
      color: rgba(150,168,196,0.45);
      scroll-snap-align: center;
      transition: color 0.12s, font-size 0.12s, font-weight 0.12s;
      font-family: 'Courier New', monospace;
      user-select: none;
    }

    .wheel-item.near{ color: rgba(150,168,196,0.75); font-size: 28px; }

    .wheel-item.selected{
      color: var(--text);
      font-size: 34px;
      font-weight: 700;
    }

    .wheel-sep{
      font-size: 30px;
      font-weight: 700;
      color: var(--teal);
      padding: 0 2px;
      margin-top: 18px;
      pointer-events: none;
      flex-shrink: 0;
      text-shadow: 0 0 10px rgba(32,209,194,0.5);
    }

    .wheel-selected-bar{
      position: absolute;
      top: 50%;
      left: 0; right: 0;
      height: 36px;
      transform: translateY(-50%);
      background: rgba(32,209,194,0.07);
      border-top: 1px solid rgba(32,209,194,0.25);
      border-bottom: 1px solid rgba(32,209,194,0.25);
      pointer-events: none;
      z-index: 3;
      margin-top: 9px;
    }

    .wheel-fade-top,
    .wheel-fade-bottom{
      position: absolute;
      left: 0; right: 0;
      height: 62px;
      pointer-events: none;
      z-index: 3;
    }

    .wheel-fade-top{
      top: 0;
      background: linear-gradient(to bottom, var(--input-bg) 10%, transparent 100%);
      border-radius: 18px 18px 0 0;
    }

    .wheel-fade-bottom{
      bottom: 0;
      background: linear-gradient(to top, var(--input-bg) 10%, transparent 100%);
      border-radius: 0 0 18px 18px;
    }

    body.day .wheel-fade-top{
      background: linear-gradient(to bottom, rgba(255,255,255,0.30) 10%, transparent 100%);
    }
    body.day .wheel-fade-bottom{
      background: linear-gradient(to top, rgba(255,255,255,0.30) 10%, transparent 100%);
    }

    .input-box{ display: none; }

    @media (max-width: 700px){
      .wheel-item{ font-size: 22px; }
      .wheel-item.near{ font-size: 25px; }
      .wheel-item.selected{ font-size: 28px; }
      .wheel-selector{ height: 160px; }
      .wheel-drum{ height: 160px; padding: 62px 0; }
      .wheel-selected-bar{ margin-top: 9px; }
    }

    /* Run mode: clock-style flow */
    .ring-wrap{
      display: none;
    }

    body.run-mode .ring-wrap{
      display: flex;
      width: min(72vw, 360px);
      height: min(72vw, 360px);
      margin: 6px auto 18px;
    }

    body.run-mode .ring-wrap::before{
      width: min(56vw, 270px);
      height: min(56vw, 270px);
    }

    body.run-mode .wheel-selector-wrap,
    body.run-mode .quote-box{
      display: none;
    }

    body.run-mode .hero{
      display: none;
    }

    body.run-mode .top{
      padding: 0;
      min-height: 0;
      border: none;
      background: transparent;
    }

    body.run-mode .settings-btn{
      display: flex;
      opacity: 1;
      pointer-events: auto;
      top: 14px;
      right: 16px;
    }

    body.run-mode .app{
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: stretch;
      max-width: 560px;
      min-height: min(86vh, 760px);
      padding-top: 12px;
    }

    body.run-mode .bottom{
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-top: 24px;
      gap: 6px;
    }

    body.run-mode #timer,
    body.run-mode .ring-timer{
      font-size: clamp(34px, 7vw, 52px);
      letter-spacing: 1px;
    }

    body.run-mode .progress-text{
      font-size: 15px;
    }

    body.run-mode .ring-total-label{
      font-size: 15px;
    }

    @media (orientation: landscape){
      body.run-mode .app{
        max-width: 620px;
        max-height: calc(100dvh - 24px);
        border-radius: 28px;
      }

      body.run-mode .top{
        width: 100%;
        min-width: 0;
      }

      body.run-mode .bottom{
        overflow: hidden;
      }

      body.run-mode .ring-wrap{
        width: min(48vh, 360px);
        height: min(48vh, 360px);
      }

      body.run-mode .ring-wrap::before{
        width: min(36vh, 270px);
        height: min(36vh, 270px);
      }
    }

  </style>
</head>
<body class="night">

    class="bg"

  />
  <div class="bg-dark"></div>

  <div class="page">
    <div class="app">

      <div class="top">
        <button class="settings-btn" id="settingsBtn" type="button" aria-label="Open settings" aria-expanded="false" aria-controls="settingsPanel">⚙️</button>

        <div class="hero">
          <div class="hero-title">Study Timer ⏳</div>
          <div class="name-wrap">

          </div>

        </div>

      <div class="bottom">
        <!-- Big Unique Ring -->
        <div class="ring-wrap" id="ringWrap" role="button" tabindex="0" aria-label="Tap to pause or resume timer" title="Tap ring to pause or resume">
          <svg class="ring" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">

        <!-- Scroll Wheel Time Selector -->
        <div class="wheel-selector-wrap">

  <!-- Settings panel moved outside .app to avoid overflow:auto clipping -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-label">Choose ringtone</div>
    <select id="soundSelect">
      <option value="beep">Default Beep</option>
      <option value="bell">Bell Sound</option>
      <option value="digital">Digital Alarm</option>
    </select>

    <div class="settings-label">Or upload your own sound</div>
    <input type="file" id="customSound" accept="audio/*">

    <div class="settings-label">Alarm duration (seconds)</div>
    <input type="range" id="alarmDuration" min="5" max="60" value="60">

    <div class="toggle-row">
      <span>Auto slideshow</span>
      <input type="checkbox" id="slideshowToggle" checked>
    </div>

    <div class="toggle-row">
      <span>Day mode</span>
      <input type="checkbox" id="themeToggle">
    </div>

    <div class="toggle-row">
      <span>Focus mode</span>
      <input type="checkbox" id="focusToggle">
    </div>

    <div class="settings-label" style="margin-top:4px;">App</div>
    <button id="installBtn" style="display:none;width:100%;padding:10px 12px;border-radius:12px;border:1px solid rgba(32,209,194,0.30);background:#0d2040;color:#20d1c2;font-size:13px;cursor:pointer;margin-bottom:6px;">
      📲 Install App (Home Screen)
    </button>
    <div id="installNote" style="font-size:11px;color:var(--muted);text-align:center;display:none;">App already installed ✅</div>
  </div>

  <script>
    // Read saved totalTime immediately (before loadSettings)
    const _savedT = localStorage.getItem("totalTime");
    let totalTime = _savedT ? parseInt(_savedT, 10) : 25 * 60;
    let time = totalTime;
    let interval = null;
    let customAudio = null;
    let customAudioURL = null; // Fix #3: track object URL for revocation
    let isPaused = false;
    let slideshowInterval = null;
    let alarmStopTimer = null;   // Fix #2: will be properly cleared
    let currentAudioCtx = null;

    const circle = document.getElementById("progressCircle");
    const timerEl = document.getElementById("timer");
    const minutesInput = document.getElementById("minutesInput");
    const quoteBox = document.getElementById("quoteBox");
    const progressText = document.getElementById("progressText");
    const ringWrap = document.getElementById("ringWrap");
    const soundSelect = document.getElementById("soundSelect");
    const customSoundInput = document.getElementById("customSound");
    const settingsBtn = document.getElementById("settingsBtn");
    const settingsPanel = document.getElementById("settingsPanel");
    const themeToggle = document.getElementById("themeToggle");
    const focusToggle = document.getElementById("focusToggle");
    const slideshowToggle = document.getElementById("slideshowToggle");
    const bgImage = document.getElementById("bgImage");
    const notifyCard = document.getElementById("notifyCard");
    const alarmDuration = document.getElementById("alarmDuration");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");
    const totalLabel = document.getElementById("totalLabel");
    const tipDot = document.getElementById("tipDot");
    const circumference = 628.3; // r=100

    const backgrounds = ["bg1.jpg","bg2.jpg","bg3.jpg","bg4.jpg","bg5.jpg"];
    let lastBgIndex = 0;

    const quotes = [
      "Small steps daily create big results.",
      "Discipline beats motivation.",
      "Aaj ka focus kal ka success hai.",
      "Keep studying. Your future is watching.",
      "Consistency is your real superpower.",
      "Focus now, shine later."
    ];

    // ── Fix #6: Load persisted settings from localStorage ──
    function loadSettings() {
      const theme = localStorage.getItem("theme");
      const focus = localStorage.getItem("focus") === "true";
      const slideshow = localStorage.getItem("slideshow");
      const sound = localStorage.getItem("sound");
      const alarmDur = localStorage.getItem("alarmDuration");
      const savedTime = localStorage.getItem("totalTime");

      if (theme === "day") {
        document.body.classList.add("day");
        themeToggle.checked = true;
      }
      if (focus) {
        document.body.classList.add("focus");
        focusToggle.checked = true;
        stopSlideshow();
        if (slideshowToggle) slideshowToggle.checked = false;
      }
      if (slideshow === "false") {
        slideshowToggle.checked = false;
      }
      if (sound) soundSelect.value = sound;
      if (alarmDur) alarmDuration.value = alarmDur;
      if (savedTime) {
        totalTime = parseInt(savedTime, 10);
        time = totalTime;
        // Restore wheel to saved total time (approximate minutes)
        const savedMin = Math.floor(totalTime / 60);
        const savedSec = totalTime % 60;
        const savedHr = Math.floor(savedMin / 60);
        const savedMm = savedMin % 60;
        // defer until wheels are built
        window._restoreWheel = { h: savedHr, m: savedMm, s: savedSec };
      }
    }

    function saveSettings() {
      localStorage.setItem("theme", document.body.classList.contains("day") ? "day" : "night");
      localStorage.setItem("focus", focusToggle.checked);
      localStorage.setItem("slideshow", slideshowToggle.checked);
      localStorage.setItem("sound", soundSelect.value);
      localStorage.setItem("alarmDuration", alarmDuration.value);
      localStorage.setItem("totalTime", totalTime);
    }

    // ── Notifications ──
    function showNotification(message) {
      notifyCard.textContent = message;
      notifyCard.classList.add("show");
      clearTimeout(showNotification._timer);
      showNotification._timer = setTimeout(() => {
        notifyCard.classList.remove("show");
      }, 2600);
    }

    // ── Fix #7: Browser notification + vibration on timer end ──
    function requestNotifPermission() {
      if ("Notification" in window && Notification.permission === "default") {
        Notification.requestPermission();
      }
    }

    function sendBrowserNotification() {
      if ("Notification" in window && Notification.permission === "granted") {
        new Notification("Priyanshu Study Timer ⏰", {
          body: "Time's up! Great focus session! 🔥",
          icon: "icon-192.png"
        });
      }
      if (navigator.vibrate) {
        navigator.vibrate([400, 200, 400, 200, 600]);
      }
    }

    // ── Settings panel ──
    // ── Settings open/close ──
    settingsBtn.onclick = function() {
      if (settingsPanel.style.display === "block") {
        settingsPanel.style.display = "none";
      } else {
        settingsPanel.style.display = "block";
      }
    };

    // Fix #4: Keyboard support for ring
    ringWrap.addEventListener("keydown", function(e) {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        togglePauseResume();
      }
    });

    // Fix #3: Revoke old object URL before creating new one
    customSoundInput.addEventListener("change", function(event) {
      const file = event.target.files[0];
      if (file) {
        if (customAudioURL) {
          URL.revokeObjectURL(customAudioURL);
        }
        customAudioURL = URL.createObjectURL(file);
        customAudio = new Audio(customAudioURL);
        showNotification("Custom ringtone loaded 🎵");
        saveSettings();
      }
    });

    themeToggle.addEventListener("change", function () {
      if (themeToggle.checked) {
        document.body.classList.add("day");
        document.body.classList.remove("night");
        showNotification("Day mode on 🌄");
      } else {
        document.body.classList.remove("day");
        document.body.classList.add("night");
        showNotification("Night mode on 🌙");
      }
      saveSettings();
    });

    // Fix #8: Focus mode - auto stop slideshow, hide distractions
    focusToggle.addEventListener("change", function () {
      const isFocus = focusToggle.checked;
      document.body.classList.toggle("focus", isFocus);
      if (isFocus) {
        stopSlideshow();
        slideshowToggle.checked = false;
        showNotification("Focus mode on 🧠 Distractions removed");
      } else {
        slideshowToggle.checked = true;
        startSlideshow();
        showNotification("Focus mode off");
      }
      saveSettings();
    });

    slideshowToggle.addEventListener("change", function () {
      if (slideshowToggle.checked) {
        startSlideshow();
        showNotification("Slideshow on 🎞️");
      } else {
        stopSlideshow();
        showNotification("Slideshow off");
      }
      saveSettings();
    });

    soundSelect.addEventListener("change", saveSettings);
    alarmDuration.addEventListener("change", saveSettings);

    function changeBackground() {
      let randomIndex;
      do {
        randomIndex = Math.floor(Math.random() * backgrounds.length);
      } while (randomIndex === lastBgIndex && backgrounds.length > 1);
      lastBgIndex = randomIndex;
      bgImage.style.opacity = "0.35";
      setTimeout(() => {
        bgImage.src = backgrounds[randomIndex];
        bgImage.style.opacity = "1";
      }, 250);
    }

    function startSlideshow() {
      stopSlideshow();
      slideshowInterval = setInterval(changeBackground, 10000);
    }

    function stopSlideshow() {
      if (slideshowInterval) {
        clearInterval(slideshowInterval);
        slideshowInterval = null;
      }
    }

    // Fix #2: clearTimeout(alarmStopTimer) added
    function stopAlarm() {
      clearTimeout(alarmStopTimer);
      alarmStopTimer = null;
      if (customAudio) {
        customAudio.pause();
        customAudio.currentTime = 0;
      }
      if (currentAudioCtx) {
        currentAudioCtx.close().catch(() => {});
        currentAudioCtx = null;
      }
    }

    function playPresetSound(type, durationSec) {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;
      stopAlarm();
      const audioCtx = new AudioContextClass();
      currentAudioCtx = audioCtx;
      let pattern, waveType = "sine";
      if (type === "bell") {
        pattern = [1047, 1319, 1568, 1319]; waveType = "triangle";
      } else if (type === "digital") {
        pattern = [880, 880, 1175, 1175]; waveType = "square";
      } else {
        pattern = [880, 988, 1047, 1175];
      }
      const startTime = audioCtx.currentTime;
      const totalCycles = Math.ceil(durationSec / 0.9);
      for (let cycle = 0; cycle < totalCycles; cycle++) {
        pattern.forEach((freq, i) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = waveType;
          osc.frequency.value = freq;
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          const start = startTime + cycle * 0.9 + i * 0.22;
          const end = start + 0.18;
          gain.gain.setValueAtTime(0.0001, start);
          gain.gain.exponentialRampToValueAtTime(0.22, start + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, end);
          osc.start(start);
          osc.stop(end);
        });
      }
      alarmStopTimer = setTimeout(stopAlarm, durationSec * 1000);
    }

    function playAlarm() {
      const durationSec = parseInt(alarmDuration.value, 10) || 60;
      stopAlarm();
      if (customAudio) {
        customAudio.loop = true;
        customAudio.currentTime = 0;
        customAudio.play();
        alarmStopTimer = setTimeout(stopAlarm, durationSec * 1000);
      } else {
        playPresetSound(soundSelect.value, durationSec);
      }
    }

    function formatTime(sec) {
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = sec % 60;
      if (h > 0) {
        return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
      }
      return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    }

    function formatTotalLabel(sec) {
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = sec % 60;
      if (h > 0 && m > 0) return `Total ${h}h ${m}m`;
      if (h > 0) return `Total ${h}h`;
      if (m > 0 && s > 0) return `Total ${m}m ${s}s`;
      if (m > 0) return `Total ${m} min`;
      return `Total ${s}s`;
    }

    function updateDisplay() {
      timerEl.innerText = formatTime(time);

      const remaining = time / totalTime;
      const completed = 1 - remaining;

      // Arc progress
      circle.style.strokeDashoffset = circumference * (1 - completed);

      // Rotate tip dot along the arc (starts top = -90deg)
      const angle = -90 + completed * 360;
      const rad = angle * Math.PI / 180;
      const cx = 120, cy = 120, r = 100;
      const dx = cx + r * Math.cos(rad);
      const dy = cy + r * Math.sin(rad);
      if (tipDot) { tipDot.setAttribute("cx", dx); tipDot.setAttribute("cy", dy); }

      // Remaining %
      const remainPercent = Math.round(remaining * 100);
      progressText.innerText = `${remainPercent}%`;

      // Update total label
      if (totalLabel) totalLabel.innerText = formatTotalLabel(totalTime);

      // Color gradient changes
      if (remaining > 0.6) {
        circle.style.stroke = "";
        circle.setAttribute("stroke", "url(#ringGrad)");
      } else if (remaining > 0.3) {
        circle.setAttribute("stroke", "#eab308");
        if (tipDot) tipDot.setAttribute("fill", "#eab308");
      } else {
        circle.setAttribute("stroke", "#ef4444");
        if (tipDot) tipDot.setAttribute("fill", "#ef4444");
      }
    }

    function startTimer() {
      document.body.classList.add("run-mode");
      stopAlarm();
      if (interval !== null) return;
      requestNotifPermission(); // Fix #7
      isPaused = false;
      interval = setInterval(() => {
        if (time > 0) {
          time--;
          updateDisplay();
        } else {
          clearInterval(interval);
          interval = null;
          isPaused = false;
          ringWrap.classList.add("ring-alert");
          playAlarm();
          sendBrowserNotification(); // Fix #7
          quoteBox.innerText = "Time's up! 🔥";
          showNotification("Time's up! 🔥");
        }
      }, 1000);
    }

    function togglePauseResume() {
      if (interval !== null) {
        clearInterval(interval);
        interval = null;
        isPaused = true;
        quoteBox.innerText = "Paused ⏸️  Tap ring again to resume";
        showNotification("Paused ⏸️");
      } else if (time > 0 && time < totalTime && isPaused) {
        quoteBox.innerText = "Resumed ▶️";
        showNotification("Resumed ▶️");
        startTimer();
      }
    }

    function restartTimer() {
      clearInterval(interval);
      interval = null;
      isPaused = false;
      stopAlarm();
      time = totalTime;
      ringWrap.classList.remove("ring-alert");
      document.body.classList.remove("run-mode");
      updateDisplay();
      quoteBox.innerText = "Restarted 🔄";
      showNotification("Restarted 🔄");
    }

    // ── Scroll Wheel Time Selector ──
    const ITEM_H = 36;

    function buildWheel(drumEl, count, pad) {
      // No extra padding items needed — CSS padding handles visual centering
      // scrollTop = N * ITEM_H → shows value N in center
      for (let i = 0; i < count; i++) {
        const div = document.createElement("div");
        div.className = "wheel-item";
        div.textContent = pad ? String(i).padStart(2, "0") : String(i);
        div.dataset.val = i;
        drumEl.appendChild(div);
      }
    }

    function getWheelValue(drumEl) {
      return Math.round(drumEl.scrollTop / ITEM_H);
    }

    function setWheelValue(drumEl, val) {
      drumEl.scrollTop = val * ITEM_H;
      updateWheelHighlight(drumEl);
    }

    function updateWheelHighlight(drumEl) {
      const idx = Math.round(drumEl.scrollTop / ITEM_H);
      drumEl.querySelectorAll(".wheel-item").forEach((el, i) => {
        el.classList.remove("selected", "near");
        if (i === idx) el.classList.add("selected");
        else if (Math.abs(i - idx) === 1) el.classList.add("near");
      });
    }

    function attachWheelEvents(drumEl) {
      let ticking = false;
      drumEl.addEventListener("scroll", function() {
        if (!ticking) {
          requestAnimationFrame(() => { updateWheelHighlight(drumEl); ticking = false; });
          ticking = true;
        }
      }, { passive: true });
      let snapTimer;
      drumEl.addEventListener("scroll", function() {
        clearTimeout(snapTimer);
        snapTimer = setTimeout(() => {
          const maxScroll = drumEl.scrollHeight - drumEl.clientHeight;
          const idx = Math.min(Math.round(drumEl.scrollTop / ITEM_H), Math.floor(maxScroll / ITEM_H));
          drumEl.scrollTo({ top: idx * ITEM_H, behavior: "smooth" });
          updateWheelHighlight(drumEl);
        }, 80);
      }, { passive: true });
    }

    const drumH = document.getElementById("wheelHours");
    const drumM = document.getElementById("wheelMinutes");
    const drumS = document.getElementById("wheelSeconds");

    buildWheel(drumH, 24, true);
    buildWheel(drumM, 60, true);
    buildWheel(drumS, 60, true);

    // Restore saved or default values
    // loadSettings runs AFTER this block, so read localStorage directly
    (function() {
      const savedTime = localStorage.getItem("totalTime");
      if (savedTime) {
        const t = parseInt(savedTime, 10);
        const h = Math.floor(t / 3600);
        const m = Math.floor((t % 3600) / 60);
        const s = t % 60;
        setWheelValue(drumH, h);
        setWheelValue(drumM, m);
        setWheelValue(drumS, s);
      } else {
        setWheelValue(drumH, 0);
        setWheelValue(drumM, 25);
        setWheelValue(drumS, 0);
      }
    })();

    attachWheelEvents(drumH);
    attachWheelEvents(drumM);
    attachWheelEvents(drumS);

    function getWheelTotalSeconds() {
      const h = getWheelValue(drumH);
      const m = getWheelValue(drumM);
      const s = getWheelValue(drumS);
      return h * 3600 + m * 60 + s;
    }

    function setCustomTime() {
      const secs = getWheelTotalSeconds();
      if (secs <= 0) { showNotification("Please select a time"); return; }
      clearInterval(interval);
      interval = null;
      isPaused = false;
      stopAlarm();
      totalTime = secs;
      time = totalTime;
      updateDisplay();
      const h = getWheelValue(drumH);
      const m = getWheelValue(drumM);
      const s = getWheelValue(drumS);
      const label = (h > 0 ? h+"h " : "") + (m > 0 ? m+"m " : "") + (s > 0 ? s+"s" : "");
      quoteBox.innerText = label.trim() + " set";
      changeBackground();
      showNotification(label.trim() + " set");
      saveSettings();
    }

    [drumH, drumM, drumS].forEach(d => {
      d.addEventListener("scroll", () => {
        clearTimeout(d._applyTimer);
        d._applyTimer = setTimeout(setCustomTime, 500);
      }, { passive: true });
    });

    startBtn.addEventListener("click", startTimer);
    restartBtn.addEventListener("click", restartTimer);

    ringWrap.addEventListener("click", togglePauseResume);

    // Draw tick marks on the ring
    (function drawTicks() {
      const g = document.getElementById("tickMarks");
      if (!g) return;
      const cx = 120, cy = 120, r = 100;
      for (let i = 0; i < 60; i++) {
        const angle = (i / 60) * 360 - 90;
        const rad = angle * Math.PI / 180;
        const isMajor = i % 5 === 0;
        const inner = r - (isMajor ? 10 : 5);
        const outer = r + 1;
        const x1 = cx + inner * Math.cos(rad);
        const y1 = cy + inner * Math.sin(rad);
        const x2 = cx + outer * Math.cos(rad);
        const y2 = cy + outer * Math.sin(rad);
        const line = document.createElementNS("http://www.w3.org/2000/svg","line");
        line.setAttribute("x1", x1); line.setAttribute("y1", y1);
        line.setAttribute("x2", x2); line.setAttribute("y2", y2);
        line.setAttribute("stroke", isMajor ? "rgba(32,209,194,0.30)" : "rgba(255,255,255,0.08)");
        line.setAttribute("stroke-width", isMajor ? "2" : "1");
        g.appendChild(line);
      }
    })();

    // Init
    loadSettings();
    updateDisplay();
    if (slideshowToggle.checked && !focusToggle.checked) startSlideshow();

    // ── PWA Install ──
    let deferredPrompt = null;
    const installBtn = document.getElementById("installBtn");
    const installNote = document.getElementById("installNote");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = "block";
    });

    installBtn.addEventListener("click", async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.style.display = "none";
      if (outcome === "accepted") {
        installNote.style.display = "block";
        showNotification("App installed! 📲");
      }
    });

    window.addEventListener("appinstalled", () => {
      installBtn.style.display = "none";
      installNote.style.display = "block";
    });

    <script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js")
      .then(() => console.log("Service Worker registered"))
      .catch((err) => console.log("Service Worker error:", err));
  });
}
</script>
</body>
